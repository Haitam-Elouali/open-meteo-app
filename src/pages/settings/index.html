<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/static/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@200;400;500&display=swap" rel="stylesheet">
    <link href="/components/global.css" rel="stylesheet">
    <link href="/components/header/header.css?v=2" rel="stylesheet">
    <link href="/pages/settings/settings.css" rel="stylesheet">
    <script defer src="/pages/settings/settings.js"></script>
    <title>Settings - Open Arsad</title>
</head>
<body>
    <header class="header">
        <div class="header__left">
            <div class="header__logo">
                <img src="/static/logo.png" width="40" height="40" alt="Open Arsad image">
            </div>
            <span class="header__site-name">Open Arsad</span>
        </div>

        <nav class="header__nav">
            <a href="/" class="header__nav-link" data-i18n="nav.home">Home</a>
            <a href="/dashboard" class="header__nav-link" data-i18n="nav.dashboard">Dashboard</a>
            <a href="/details" class="header__nav-link" data-i18n="nav.forecast">Details</a>
        </nav>

        <div class="header__right-controls">
            <button class="header__geo-button" type="button" data-i18n-title="header.geoTitle" title="Choose location">
                <img src="/static/gps.png" width="28" height="28" alt="location image">
            </button>

            <button class="header__settings-button" type="button" title="Settings" id="settings-button">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="3"/>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                </svg>
            </button>
        </div>
    </header>

    <div class="page">
        <div class="card">
            <h1>Settings</h1>

            <section class="settings-section">
                <h2>Appearance</h2>
                <label class="settings-label">
                    <svg class="settings-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="5"/>
                        <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
                    </svg>
                    Theme
                </label>
                <select class="settings-select" id="theme-select">
                    <option value="weather">Weather-based</option>
                    <option value="light">Light</option>
                    <option value="dark">Dark</option>
                </select>
            </section>

            <section class="settings-section">
                <h2>Units</h2>
                <label class="settings-label">
                    <svg class="settings-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 14.76V3.5a2.5 2.5 0 0 0-5 0v11.26a4.5 4.5 0 1 0 5 0z"/>
                    </svg>
                    Temperature
                </label>
                <select class="settings-select" id="temp-unit-select">
                    <option value="c">Celsius (°C)</option>
                    <option value="f">Fahrenheit (°F)</option>
                </select>

                <label class="settings-label">
                    <svg class="settings-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9.59 4.59A2 2 0 1 1 11 8H2m10.59 11.41A2 2 0 1 0 14 16H2m15.73-8.27A2.5 2.5 0 1 1 19.5 12H2"/>
                    </svg>
                    Wind Speed
                </label>
                <select class="settings-select" id="wind-unit-select">
                    <option value="kmh">km/h</option>
                    <option value="kt">kt</option>
                    <option value="ms">m/s</option>
                </select>
            </section>

            <section class="settings-section">
                <h2>Language</h2>
                <label class="settings-label">
                    <svg class="settings-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
                    </svg>
                    UI Language
                </label>
                <select class="settings-select" id="settings-lang-select">
                    <option value="en">English</option>
                    <option value="fr">Français</option>
                    <option value="es">Español</option>
                    <option value="ar">العربية</option>
                </select>
            </section>

            <section class="settings-section">
                <h2>Saved Locations</h2>
                <p class="settings-hint">Add recent and favorite cities for quick access.</p>
                <div class="favorites-list" id="favorites-list">
                    <div class="settings-placeholder">No saved locations.</div>
                </div>
                <div class="favorites-actions">
                    <input class="settings-input" id="fav-city" placeholder="City" disabled>
                    <select class="settings-select" id="fav-country">
                        <option value="">Country</option>
                    </select>
                    <button class="settings-button" id="fav-add" disabled>Save</button>
                </div>
            </section>
        </div>
    </div>
</body>
</html>
