<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/static/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@200;400;500&display=swap" rel="stylesheet">
    <link href="/components/global.css" rel="stylesheet">
    <link href="/components/header/header.css?v=2" rel="stylesheet">
    <link href="/pages/details/details.css" rel="stylesheet">
    <link href="/components/capitals-ticker.css" rel="stylesheet">
    <script defer src="/components/units.js"></script>
    <script defer src="/components/i18n.js"></script>
    <script defer src="/components/weather-background.js"></script>
    <script defer src="/components/capitals-ticker.js?v=2"></script>
    <script defer src="/pages/details/details.js?v=7"></script>
    <script defer src="/components/location-modal.js"></script>
    <script defer src="/components/settings-modal.js?v=2"></script>
    <title>Forecast - Open Arsad</title>
</head>
<body>
    <header class="header header--forecast">
        <div class="header__left">
            <div class="header__logo">
                <img src="/static/logo.png" width="40" height="40" alt="Open Arsad image">
            </div>
            <span class="header__site-name">Open Arsad</span>
        </div>

        <nav class="header__nav">
            <a href="/" class="header__nav-link" data-i18n="nav.home">Home</a>
            <a href="/dashboard" class="header__nav-link" data-i18n="nav.dashboard">Dashboard</a>
            <a href="/details" class="header__nav-link header__nav-link--active" data-i18n="nav.forecast">Forecast</a>
        </nav>

        <div class="header__right-controls">
            <button class="header__geo-button" type="button" data-i18n-title="header.geoTitle" title="Choose location">
                <img src="/static/gps.png" width="28" height="28" alt="location image">
            </button>

            <button class="header__settings-button" type="button" data-i18n-title="header.settingsTitle" title="Settings" id="settings-button">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="3"/>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                </svg>
            </button>
        </div>
    </header>

    <div class="capitals-ticker" aria-label="Capital cities weather">
        <div class="capitals-ticker__stage" id="capitals-stage"></div>
    </div>

    <div class="settings-modal-backdrop" hidden>
        <div class="settings-modal" role="dialog" aria-modal="true">
            <div class="settings-modal-header">
                <h2>Settings</h2>
                <button class="settings-modal-close" type="button">&times;</button>
            </div>
            <div class="settings-modal-body">
                <section class="settings-section">
                    <h3>Units</h3>
                    <label class="settings-label">
                        <svg class="settings-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M14 14.76V3.5a2.5 2.5 0 0 0-5 0v11.26a4.5 4.5 0 1 0 5 0z"/>
                        </svg>
                        Temperature
                    </label>
                    <select class="settings-select" id="temp-unit-select">
                        <option value="c">Celsius (°C)</option>
                        <option value="f">Fahrenheit (°F)</option>
                    </select>
                    <label class="settings-label">
                        <svg class="settings-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9.59 4.59A2 2 0 1 1 11 8H2m10.59 11.41A2 2 0 1 0 14 16H2m15.73-8.27A2.5 2.5 0 1 1 19.5 12H2"/>
                        </svg>
                        Wind Speed
                    </label>
                    <select class="settings-select" id="wind-unit-select">
                        <option value="kmh">km/h</option>
                        <option value="kt">kt</option>
                        <option value="ms">m/s</option>
                    </select>
                </section>
                <section class="settings-section">
                    <h3>Language</h3>
                    <label class="settings-label">
                        <svg class="settings-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"/>
                            <path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
                        </svg>
                        UI Language
                    </label>
                    <select class="settings-select" id="settings-lang-select">
                        <option value="en">English</option>
                        <option value="fr">Français</option>
                        <option value="es">Español</option>
                        <option value="ar">العربية</option>
                    </select>
                </section>
            </div>
            <div class="settings-modal-footer">
                <button class="settings-cancel" type="button">Cancel</button>
                <button class="settings-confirm primary" type="button">Confirm</button>
            </div>
        </div>
    </div>

    <div class="page">
        <div class="details-loading" id="details-loading">Loading forecast...</div>

        <!-- Forecast with horizon toggle (one single card) -->
        <div class="forecast-block">
            <div class="forecast-toolbar">
                <div class="forecast-toggle" id="forecast-toggle">
                    <button type="button" data-days="7" class="active">7 days</button>
                    <button type="button" data-days="14">14 days</button>
                    <button type="button" data-days="31">31 days</button>
                </div>
            </div>

            <div class="forecast-loading" id="forecast-loading" hidden>Loading forecast...</div>
            <div class="forecast-scroll">
                <button class="forecast-nav forecast-prev" type="button" aria-label="Previous">&#8249;</button>
                <div class="forecast-card forecast-scroll-view" id="details-daily"></div>
                <button class="forecast-nav forecast-next" type="button" aria-label="Next">&#8250;</button>
            </div>
        </div>
    </div>

    <div class="location-modal-backdrop" hidden>
        <div class="location-modal" role="dialog" aria-modal="true">
            <h2>Choose city &amp; country</h2>
            <label>Country</label>
            <select class="location-country">
                <option value="">Select a country</option>
            </select>
            <label>City</label>
            <select class="location-city" disabled>
                <option value="">Select a country first</option>
            </select>
            <div class="location-modal-actions">
                <button class="location-cancel">Cancel</button>
                <button class="location-confirm primary">Confirm</button>
            </div>
        </div>
    </div>
</body>
</html>
